<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - StudyGen</title>
  <link rel="stylesheet" href="../CSS/login.css">
</head>
<body>
  <div class="login-container">
    <div class="login-box">
      <h1 class="logo">StudyGen</h1>
      <h2>Welcome Back!</h2>
      <p class="subtitle">Login to continue your learning journey</p>
      
      <form id="login-form">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Enter your username" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Enter your password" required>
        </div>
        <div class="form-group checkbox-group">
          <input type="checkbox" id="remember" name="remember">
          <label for="remember">Remember me</label>
        </div>
        <button type="submit" class="btn-login">Login</button>
        <div class="error-message" id="error-message" style="display: none;"></div>
      </form>
      
      <div class="register-link">
        <p>Don't have an account? <a href="#" id="register-link">Register here</a></p>
      </div>
    </div>
    
    <!-- Registration Modal -->
    <div id="register-modal" class="modal" style="display: none;">
      <div class="modal-content">
        <span class="close">&times;</span>
        <h2>Create Account</h2>
        <form id="register-form">
          <div class="form-group">
            <label for="reg-username">Username</label>
            <input type="text" id="reg-username" name="username" placeholder="Choose a username" required>
          </div>
          <div class="form-group">
            <label for="reg-email">Email</label>
            <input type="email" id="reg-email" name="email" placeholder="Enter your email" required>
          </div>
          <div class="form-group">
            <label for="reg-password">Password</label>
            <input type="password" id="reg-password" name="password" placeholder="Choose a password" required minlength="6">
          </div>
          <div class="form-group">
            <label for="reg-confirm-password">Confirm Password</label>
            <input type="password" id="reg-confirm-password" name="confirm-password" placeholder="Confirm your password" required>
          </div>
          <button type="submit" class="btn-register">Register</button>
          <div class="error-message" id="register-error-message" style="display: none;"></div>
        </form>
      </div>
    </div>
  </div>
  <script src="../Javascript/auth.js"></script>
</body>
</html>
